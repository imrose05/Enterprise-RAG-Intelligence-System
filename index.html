<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enterprise RAG Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0f0ec;
  --txt:#1a1a18;--txt2:#6b6b66;--txt3:#9c9a92;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
  --blue-bg:#e6f1fb;--blue:#185fa5;
  --green-bg:#eaf3de;--green:#3b6d11;
  --amber-bg:#faeeda;--amber:#854f0b;
  --red-bg:#fcebeb;--red:#a32d2d;
  --r:8px;--r2:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1c;--bg2:#282825;--bg3:#141412;
  --txt:#e8e6df;--txt2:#9c9a92;--txt3:#6b6b66;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.18);
  --blue-bg:#0c2a46;--blue:#85b7eb;
  --green-bg:#172304;--green:#97c459;
  --amber-bg:#2a1800;--amber:#ef9f27;
  --red-bg:#2a0a0a;--red:#f09595;
}}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--txt);overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:260px;min-width:260px;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:18px 16px 12px;border-bottom:0.5px solid var(--border)}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-name{font-size:13px;font-weight:600;color:var(--txt)}
.logo-sub{font-size:10px;color:var(--txt2)}
.user-row{display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--green-bg);color:var(--green);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.u-name{font-size:12px;font-weight:500}
.u-role{font-size:10px;color:var(--txt2)}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--amber-bg);color:var(--amber);font-weight:600;white-space:nowrap}
.role-sel{padding:10px 16px;border-bottom:0.5px solid var(--border)}
.role-sel label{font-size:10px;color:var(--txt2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.role-sel select{width:100%;font-size:12px;padding:6px 8px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg2);color:var(--txt);cursor:pointer}
.src-list{flex:1;overflow-y:auto;padding:10px 0}
.src-head{font-size:10px;font-weight:600;color:var(--txt3);padding:0 16px 8px;text-transform:uppercase;letter-spacing:.06em}
.src-item{display:flex;align-items:center;gap:10px;padding:8px 16px}
.src-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.src-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.src-count{font-size:10px;color:var(--txt2)}
.src-meta{flex:1;min-width:0}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.tag-y{background:var(--green-bg);color:var(--green)}
.tag-n{background:var(--red-bg);color:var(--red)}
.sb-foot{padding:12px 16px;border-top:0.5px solid var(--border)}
.stats{display:flex;gap:8px}
.stat{flex:1;text-align:center;padding:8px 4px;background:var(--bg2);border-radius:7px}
.stat strong{display:block;font-size:17px;font-weight:600;color:var(--txt)}
.stat span{font-size:10px;color:var(--txt2)}
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg3)}
.top-bar{padding:14px 20px;background:var(--bg);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.top-bar h1{font-size:14px;font-weight:500;flex:1}
.live{font-size:11px;padding:3px 9px;border-radius:6px;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.rbac-bar{padding:7px 20px;font-size:11px;background:var(--amber-bg);color:var(--amber);border-bottom:0.5px solid var(--border);display:none;align-items:center;gap:6px}
.rbac-bar.on{display:flex}
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--txt2);text-align:center;padding:40px}
.empty-ico{width:52px;height:52px;border-radius:13px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:4px}
.empty h2{font-size:15px;font-weight:500;color:var(--txt)}
.empty p{font-size:13px;max-width:300px;line-height:1.6}
.msg-u{align-self:flex-end;max-width:65%;background:var(--blue-bg);color:var(--txt);padding:10px 14px;border-radius:12px 12px 3px 12px;font-size:13px;line-height:1.5}
.msg-s{align-self:flex-start;max-width:82%}
.msg-hd{font-size:11px;color:var(--txt2);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.msg-b{background:var(--bg);border:0.5px solid var(--border);border-radius:3px 12px 12px 12px;padding:12px 14px;font-size:13px;line-height:1.6}
.msg-err{background:var(--red-bg);border:0.5px solid var(--border);border-radius:3px 12px 12px 12px;padding:12px 14px;font-size:12px;line-height:1.6;color:var(--red);font-family:monospace;white-space:pre-wrap;word-break:break-all}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.chip{font-size:11px;padding:3px 8px;border-radius:4px;border:0.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:4px}
.denied{background:var(--red-bg);border:0.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);display:flex;gap:8px;align-items:flex-start}
.think{margin-bottom:8px}
.step{font-size:11px;color:var(--txt2);padding:2px 0;display:flex;align-items:center;gap:6px;transition:color .2s}
.step.active{color:var(--blue)}
.step.done{color:var(--green)}
.dots{display:flex;gap:4px;padding:6px 0}
.d{width:6px;height:6px;border-radius:50%;background:var(--txt2);animation:bounce 1.2s ease-in-out infinite}
.d:nth-child(2){animation-delay:.2s}.d:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(1)}40%{transform:scale(1.5)}}
.q-area{padding:14px 20px;background:var(--bg);border-top:0.5px solid var(--border)}
.sq{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.sq-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--txt2);cursor:pointer;transition:all .15s}
.sq-btn:hover{background:var(--bg3);color:var(--txt)}
.irow{display:flex;gap:8px;align-items:flex-end}
textarea{flex:1;resize:none;height:42px;padding:10px 12px;font-size:13px;line-height:1.4;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--txt);font-family:inherit;transition:border-color .15s}
textarea:focus{outline:none;border-color:var(--blue)}
.send{width:42px;height:42px;border-radius:8px;background:var(--txt);color:var(--bg);border:none;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:opacity .15s;flex-shrink:0}
.send:hover{opacity:.8}
.send:disabled{opacity:.3;cursor:not-allowed}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sb-head">
      <div class="logo">
        <div class="logo-icon">🧠</div>
        <div><div class="logo-name">EnterpriseRAG</div><div class="logo-sub">Intelligence Platform</div></div>
      </div>
      <div class="user-row">
        <div class="avatar" id="avatar">JD</div>
        <div style="flex:1">
          <div class="u-name" id="uname">Jane Doe</div>
          <div class="u-role" id="urole">Finance Manager</div>
        </div>
        <span class="badge" id="ubadge">Finance</span>
      </div>
    </div>

    <div class="role-sel">
      <label>Switch role to explore RBAC</label>
      <select onchange="switchRole(this.value)">
        <option value="finance">Finance Manager (Jane Doe)</option>
        <option value="engineer">Senior Engineer (Alex Chen)</option>
        <option value="hr">HR Director (Sam Rivera)</option>
        <option value="executive">C-Suite Executive (Morgan Lee)</option>
        <option value="intern">Intern (Casey Kim)</option>
      </select>
    </div>

    <div class="src-list">
      <div class="src-head">Data sources</div>
      <div id="srcs"></div>
    </div>

    <div class="sb-foot">
      <div class="stats">
        <div class="stat"><strong id="st-docs">—</strong><span>docs</span></div>
        <div class="stat"><strong id="st-src">—</strong><span>sources</span></div>
        <div class="stat"><strong id="st-q">0</strong><span>queries</span></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="top-bar">
      <span style="font-size:18px">🔍</span>
      <h1>RAG Intelligence Query</h1>
      <div class="live"><div class="dot"></div>Live</div>
    </div>
    <div class="rbac-bar" id="rbac-bar">⚠️ <span id="rbac-txt"></span></div>

    <div class="chat" id="chat">
      <div class="empty" id="empty">
        <div class="empty-ico">🔎</div>
        <h2>Ask anything across your data</h2>
        <p>Queries are intelligently routed to relevant sources and filtered by your access level.</p>
      </div>
    </div>

    <div class="q-area">
      <div class="sq" id="sq"></div>
      <div class="irow">
        <textarea id="inp" placeholder="Ask a question across enterprise data..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
          oninput="this.style.height='42px';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
        <button class="send" id="sendbtn" onclick="send()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
const ROLES={
  finance:{name:'Jane Doe',init:'JD',label:'Finance Manager',badge:'Finance',
    access:['financial','compliance','reports'],
    qs:['Summarize Q3 revenue performance','What compliance issues were flagged last quarter?','Show budget variance for engineering']},
  engineer:{name:'Alex Chen',init:'AC',label:'Senior Engineer',badge:'Engineering',
    access:['technical','logs','operational'],
    qs:['Show critical errors from the past 24 hours','What API endpoints have the highest latency?','Summarize the latest deployment report']},
  hr:{name:'Sam Rivera',init:'SR',label:'HR Director',badge:'HR',
    access:['hr','compliance','reports'],
    qs:['What is our current headcount by department?','Summarize compliance training completion rates','Show open requisitions across all teams']},
  executive:{name:'Morgan Lee',init:'ML',label:'C-Suite Executive',badge:'Executive',
    access:['financial','technical','hr','compliance','reports','logs','operational'],
    qs:['Give me a full business health summary','What are our top operational risks?','Compare Q2 vs Q3 performance']},
  intern:{name:'Casey Kim',init:'CK',label:'Intern',badge:'Intern',
    access:['reports'],
    qs:['Where can I find onboarding documents?','What public reports are available?','Show me the company org chart']}
};

const SRCS=[
  {id:'financial', name:'Financial Records', icon:'📊', count:'14.2K docs',  clr:'#3B8BD4',bg:'#e6f1fb'},
  {id:'technical', name:'Technical Docs',    icon:'💻', count:'8.7K pages',  clr:'#0F6E56',bg:'#e1f5ee'},
  {id:'logs',      name:'JSON Audit Logs',   icon:'🖥️', count:'2.1M entries',clr:'#533AB7',bg:'#eeedfe'},
  {id:'hr',        name:'HR Records',        icon:'👥', count:'4.3K records',clr:'#993556',bg:'#fbeaf0'},
  {id:'compliance',name:'Compliance Docs',   icon:'🛡️', count:'892 files',   clr:'#854F0B',bg:'#faeeda'},
  {id:'reports',   name:'Business Reports',  icon:'📈', count:'3.6K reports',clr:'#639922',bg:'#eaf3de'},
  {id:'operational',name:'Operational Data', icon:'⚙️', count:'28.9K rows',  clr:'#D85A30',bg:'#faece7'},
];

const KW={
  financial:['revenue','budget','cost','profit','finance','q3','q2','quarter','variance','spend','expense'],
  technical:['api','deploy','code','latency','service','system','endpoint','performance','architecture'],
  logs:['error','log','audit','event','trace','debug','alert','incident','exception','crash'],
  hr:['headcount','employee','hire','requisition','onboard','staff','team','workforce'],
  compliance:['compliance','regulation','policy','risk','gdpr','sox','training','certification'],
  reports:['report','summary','overview','analysis','dashboard','metric','kpi','business'],
  operational:['operation','process','workflow','pipeline','capacity','throughput','inventory'],
};

let role='finance', qcount=0, busy=false;

function switchRole(r){
  role=r;
  const R=ROLES[r];
  document.getElementById('avatar').textContent=R.init;
  document.getElementById('uname').textContent=R.name;
  document.getElementById('urole').textContent=R.label;
  document.getElementById('ubadge').textContent=R.badge;
  renderSrcs(); renderSQ(); renderRbac();
}

function renderSrcs(){
  const R=ROLES[role]; let ok=0;
  document.getElementById('srcs').innerHTML=SRCS.map(s=>{
    const has=R.access.includes(s.id); if(has)ok++;
    return`<div class="src-item">
      <div class="src-icon" style="background:${s.bg}">${s.icon}</div>
      <div class="src-meta"><div class="src-name">${s.name}</div><div class="src-count">${s.count}</div></div>
      <span class="tag ${has?'tag-y':'tag-n'}">${has?'✓':'✗'}</span>
    </div>`;
  }).join('');
  document.getElementById('st-docs').textContent=R.access.length>4?'52K+':R.access.length>2?'21K+':'4K+';
  document.getElementById('st-src').textContent=ok+'/'+SRCS.length;
}

function renderSQ(){
  document.getElementById('sq').innerHTML=ROLES[role].qs
    .map(q=>`<button class="sq-btn" onclick="prefill(this.textContent)">${q}</button>`).join('');
}

function renderRbac(){
  const R=ROLES[role],bl=SRCS.filter(s=>!R.access.includes(s.id)),el=document.getElementById('rbac-bar');
  if(bl.length&&role!=='executive'){
    document.getElementById('rbac-txt').textContent=`RBAC active: ${R.name} cannot access ${bl.slice(0,2).map(s=>s.name).join(', ')}${bl.length>2?'…':''}`;
    el.classList.add('on');
  } else el.classList.remove('on');
}

function prefill(t){document.getElementById('inp').value=t;document.getElementById('inp').focus();}
function relevant(q,id){return(KW[id]||[]).some(k=>q.toLowerCase().includes(k));}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

async function send(){
  if(busy)return;
  const inp=document.getElementById('inp'),q=inp.value.trim();
  if(!q)return;
  inp.value='';inp.style.height='42px';
  busy=true;document.getElementById('sendbtn').disabled=true;
  document.getElementById('empty')?.remove();
  const chat=document.getElementById('chat');
  qcount++;document.getElementById('st-q').textContent=qcount;

  // Snapshot the role at query time so switching mid-query doesn't corrupt the response
  const snapRole=role;
  const R=ROLES[snapRole];

  const um=document.createElement('div');
  um.className='msg-u';um.textContent=q;chat.appendChild(um);

  const sm=document.createElement('div');sm.className='msg-s';
  sm.innerHTML=`<div class="msg-hd">🤖 <span>Processing…</span></div>
    <div class="think">
      <div class="step active" id="s1">🧠 Analyzing query intent</div>
      <div class="step" id="s2">🔀 Routing to data sources</div>
      <div class="step" id="s3">🛡️ Checking RBAC permissions</div>
      <div class="step" id="s4">☁️ Retrieving context</div>
      <div class="step" id="s5">✨ Generating response</div>
    </div>
    <div class="dots"><div class="d"></div><div class="d"></div><div class="d"></div></div>`;
  chat.appendChild(sm);chat.scrollTop=chat.scrollHeight;

  for(let i=1;i<=5;i++){
    await delay(300);
    const el=document.getElementById('s'+i);
    if(el){el.classList.remove('active');el.classList.add('done');}
    const nx=document.getElementById('s'+(i+1));if(nx)nx.classList.add('active');
  }

  const ok=SRCS.filter(s=>R.access.includes(s.id));
  const bl=SRCS.filter(s=>!R.access.includes(s.id));
  const used=ok.filter(s=>relevant(q,s.id));
  const blocked=bl.some(s=>relevant(q,s.id))&&used.length===0;

  const sys=`You are a secure enterprise RAG assistant.
User: ${R.name}, Role: ${R.label}
Accessible sources: ${ok.map(s=>s.name).join(', ')||'none'}
Restricted (NO ACCESS): ${bl.map(s=>s.name).join(', ')||'none'}
Rules:
- Only use information from accessible sources. Never reveal restricted data.
- Always cite which source your answer draws from.
- If the query requires restricted data, explain the limitation clearly.
- Be concise (3-5 sentences or a short list). No markdown headers or bold text.`;

  let txt, isErr=false;
  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:sys,messages:[{role:'user',content:q}]})
    });

    const data=await res.json();

    if(data.error){
      // Anthropic returned an API-level error
      isErr=true;
      const e=data.error;
      if(e.type==='authentication_error'){
        txt='API key is invalid or missing.\n\nFix: Check your .env file and make sure ANTHROPIC_API_KEY is set correctly.\nGet your key at: console.anthropic.com';
      } else if(e.type==='billing_error'||e.message?.includes('credit')){
        txt='No billing credits on your Anthropic account.\n\nFix: Add a payment method at console.anthropic.com/settings/billing';
      } else if(e.type==='rate_limit_error'){
        txt='Rate limit hit. Wait a few seconds and try again.';
      } else {
        txt='API Error ['+e.type+']: '+e.message;
      }
    } else if(data.content && data.content.length>0){
      txt=data.content.map(b=>b.text||'').filter(Boolean).join('');
      if(!txt.trim()){
        isErr=true;
        txt='Claude returned an empty response. The prompt may have triggered a content filter.\nTry rephrasing your question.';
      }
    } else {
      isErr=true;
      txt='Unexpected API response:\n'+JSON.stringify(data,null,2);
    }
  } catch(e){
    isErr=true;
    if(e.message.includes('fetch')||e.message.includes('network')){
      txt='Cannot reach server.\n\nFix: Make sure server.js is running:\n  node server.js\n\nThen refresh this page.';
    } else {
      txt='Error: '+e.message;
    }
  }

  sm.innerHTML=`<div class="msg-hd">🤖 RAG Intelligence · ${R.name}</div>`;

  if(blocked){
    sm.innerHTML+=`<div class="denied">🔒 Access restricted. This query requires data (${bl.filter(s=>relevant(q,s.id)).map(s=>s.name).join(', ')}) that your role cannot access. Contact your administrator to request elevated permissions.</div>`;
  } else if(isErr){
    sm.innerHTML+=`<div class="msg-err">⚠️ ${txt.replace(/</g,'&lt;')}</div>`;
  } else {
    const chips=used.slice(0,4).map(s=>`<span class="chip"><span>${s.icon}</span>${s.name}</span>`).join('');
    sm.innerHTML+=`<div class="msg-b">${txt.replace(/</g,'&lt;')}${chips?`<div class="chips">${chips}</div>`:''}</div>`;
  }

  chat.scrollTop=chat.scrollHeight;
  busy=false;document.getElementById('sendbtn').disabled=false;
}

switchRole('finance');
</script>
</body>
</html>
